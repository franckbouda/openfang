# SECTION 1 — FOR USERS

## WHAT IS OPENFANG

OpenFang is an open-source **Agent Operating System** built in Rust. It runs **autonomous agents that work for you** — on schedules, 24/7 — without you having to type prompts. One binary, one command, your agents are live.

**Key stats**: 14 crates · ~137K LOC · 1,767+ tests · zero clippy warnings

---

## INSTALLATION

### Option 1: Shell installer (Linux / macOS)
```bash
curl -sSf https://openfang.sh | sh
```

### Option 2: PowerShell (Windows)
```powershell
irm https://openfang.sh/install.ps1 | iex
```

### Option 3: Desktop app
Download the `.msi` (Windows), `.dmg` (macOS), or `.AppImage`/`.deb` (Linux) from the latest release.
Includes native window, system tray, auto-updates, OS notifications.

### Option 4: Cargo (requires Rust 1.75+)
```bash
cargo install --git https://github.com/RightNow-AI/openfang openfang-cli
```

### Option 5: Docker
```bash
docker pull ghcr.io/RightNow-AI/openfang:latest
docker run -d --name openfang -p 4200:4200 \
  -e ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY \
  -v openfang-data:/data \
  ghcr.io/RightNow-AI/openfang:latest
```

---

## GETTING STARTED

```bash
openfang init          # Interactive setup wizard (provider, API key, first agent)
openfang init --quick  # Auto-detect provider from env vars and configure
openfang start         # Start daemon — dashboard at http://127.0.0.1:4200
openfang              # Launch TUI (terminal dashboard) — no args needed
```

`openfang init` auto-detects providers in this order: Groq → Gemini → DeepSeek → Anthropic → OpenAI → OpenRouter

Config file: `~/.openfang/config.toml`
Data directory: `~/.openfang/`

