## TROUBLESHOOTING

### Quick diagnostics
```bash
openfang doctor        # Full system check
openfang status        # Daemon running?
curl http://127.0.0.1:4200/api/health
```

### View logs
```bash
RUST_LOG=info openfang start           # Default
RUST_LOG=debug openfang start          # Verbose
RUST_LOG=openfang=debug openfang start # Only OpenFang debug
```

### Common issues
- **Port 4200 in use**: change port with `openfang start --port 4201` or `openfang config set api.port 4201`
- **No LLM provider**: run `openfang init` and set your API key
- **Agent not responding**: check `openfang agent logs <id>` and budget `openfang budget`
- **macOS kill daemon**: `pkill -f openfang`
- **Windows kill daemon**: `taskkill //PID <pid> //F`

