## AGENT TEMPLATE FORMAT (`agent.toml`)

```toml
name = "my-agent"
version = "0.1.0"
description = "..."
module = "builtin:chat"
tags = ["tag1"]

[model]
provider = "default"
model = "default"
api_key_env = "GROQ_API_KEY"
max_tokens = 8192
temperature = 0.3
system_prompt = "..."

[[fallback_models]]
provider = "default"
model = "default"
api_key_env = "ANTHROPIC_API_KEY"

[schedule]
continuous = { check_interval_secs = 120 }
# or: cron = "0 6 * * *"

[resources]
max_llm_tokens_per_hour = 200000
max_concurrent_tools = 10

[capabilities]
tools = ["file_read", "file_write", "file_list", "shell_exec",
         "web_search", "web_fetch", "memory_store", "memory_recall",
         "agent_send", "agent_spawn", "agent_list", "agent_kill"]
network = ["*"]
memory_read = ["*"]
memory_write = ["self.*"]
shell = ["cargo *", "git *"]
agent_spawn = true
agent_message = ["*"]
```

Agent templates are stored in `agents/<name>/agent.toml` or `~/.openfang/agents/<name>/agent.toml`.

## COMMON DEV GOTCHAS

- Binary locked by daemon → `cargo build --workspace --lib`
- `PeerRegistry` is `Option<PeerRegistry>` on kernel but `Option<Arc<PeerRegistry>>` on `AppState` → `.as_ref().map(|r| Arc::new(r.clone()))`
- `AgentLoopResult` field is `.response` not `.response_text`
- CLI daemon start command is `start` (not `daemon`)
- Dashboard: Alpine.js SPA in `static/index_body.html` — new tabs need HTML + JS in the same file
- `openfang-cli` — DO NOT MODIFY (user is actively building it)

