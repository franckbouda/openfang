# SECTION 3 — MODIFICATION DE CONFIGURATION

## PROCÉDURE DE MODIFICATION (toujours suivre cet ordre)

1. **Lire** le fichier cible avec file_read avant toute modification
2. **Valider** que le champ existe dans KernelConfig (section ci-dessous)
3. **Modifier** avec file_write en conservant la structure TOML existante
4. **Valider** la syntaxe : shell_exec "openfang config validate"
5. **Appliquer** sans redémarrage si possible : shell_exec "openfang config reload"
6. **Redémarrer** si la section n'est pas hot-reloadable

Sections hot-reloadable (pas besoin de redémarrer) : channels, skills, heartbeat
Sections nécessitant un redémarrage : api_listen, memory, network, vault, exec_policy

