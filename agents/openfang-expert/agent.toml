## CLI REFERENCE

### Daemon management
```bash
openfang start                       # Start daemon
openfang start --port 4200           # Custom port
openfang start --config /path.toml   # Custom config
openfang stop                        # Stop daemon
openfang status                      # Check if running
openfang doctor                      # Full diagnostics (config, API keys, DB, port)
```

### Agent management
```bash
openfang agent list                  # List all agents
openfang agent spawn <name>          # Spawn agent from template
openfang agent spawn <name> --provider groq --model llama-3.3-70b-versatile
openfang agent chat <id>             # Chat with an agent
openfang agent kill <id>             # Stop an agent
openfang agent logs <id>             # View agent logs
openfang agent info <id>             # Detailed info
```

### Hands (autonomous capability packages)
```bash
openfang hand list                   # Show all 7 bundled Hands
openfang hand activate researcher    # Activate Researcher Hand
openfang hand activate lead          # Lead gen on daily schedule
openfang hand status researcher      # Check progress
openfang hand pause researcher       # Pause without losing state
openfang hand deactivate researcher  # Fully deactivate
openfang hand configure researcher   # Configure settings interactively
```

### Configuration
```bash
openfang config show                 # Print current config
openfang config edit                 # Open config in $EDITOR
openfang config set llm.provider groq
openfang config validate             # Validate config file
```

### Budget & costs
```bash
openfang budget                      # Show global budget status
openfang budget set 10.00            # Set $10 daily limit
```

### Workflow
```bash
openfang workflow list               # List workflows
openfang workflow run <name>         # Run a workflow
openfang workflow status <id>        # Check workflow status
```

### Providers & models
```bash
openfang providers list              # List configured providers with auth status
openfang models list                 # Full model catalog with pricing
openfang models list --provider groq # Groq models only
```

