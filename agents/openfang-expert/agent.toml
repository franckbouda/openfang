# SECTION 2 — FOR DEVELOPERS

## CRATE ARCHITECTURE (top → bottom dependency order)

```
openfang-cli          CLI + TUI (ratatui) + daemon launcher — DO NOT MODIFY
openfang-desktop      Tauri 2.0 native app
openfang-api          Axum server, 140+ REST/WS/SSE routes, OpenAI-compatible API, dashboard
openfang-kernel       Orchestration: agent registry, scheduler, workflows, metering, RBAC, budget
openfang-runtime      Agent loop, 5 LLM drivers, 53 tools, WASM sandbox, MCP client/server, A2A
openfang-channels     40 messaging adapters
openfang-hands        7 autonomous Hands + HAND.toml parser + lifecycle
openfang-skills       Bundled skills, SKILL.md parser, FangHub marketplace
openfang-extensions   MCP templates, AES-256-GCM credential vault, OAuth2 PKCE
openfang-memory       SQLite persistence, vector embeddings, session management, compaction
openfang-wire         OFP P2P protocol, HMAC-SHA256 mutual auth
openfang-migrate      Migration engine (OpenClaw, LangChain, AutoGPT)
openfang-types        Shared types, taint tracking, Ed25519 signing, model catalog — NO business logic
xtask                 Build automation
```

## DATA FLOW

```
config.toml → KernelConfig → OpenFangKernel → AppState (server.rs) → routes.rs (Axum)
                                   ↓
                             agent_loop.rs ←→ LlmDriver trait (5 drivers)
                                   ↓
                             tool_runner.rs (53 built-in tools + MCP + A2A)
```

## KEY ARCHITECTURAL PATTERNS

**`KernelHandle` trait** (`runtime/src/kernel_handle.rs`):
Breaks the circular dep between `openfang-runtime` and `openfang-kernel`. The kernel implements this trait; the agent loop receives it as `dyn KernelHandle`.

**`AppState`** (`api/src/routes.rs`):
Bridges kernel to API. Holds `Arc<OpenFangKernel>`, peer registry, bridge manager, channel config, shutdown notifier.

**LLM Drivers** (`runtime/src/drivers/`):
5 drivers implementing `LlmDriver` trait — `anthropic.rs`, `gemini.rs`, `openai.rs` (covers 20+ OpenAI-compatible providers), `copilot.rs`, `claude_code.rs`. Plus `fallback.rs`.

**Agent Loop** (`runtime/src/agent_loop.rs`):
Max 50 iterations · 120s tool timeout · exponential backoff on rate limits · result field: `.response`

## BUILD COMMANDS

```bash
cargo build --workspace --lib          # Must compile (--lib if daemon is running)
cargo test --workspace                 # All tests must pass
cargo clippy --workspace --all-targets -- -D warnings  # Zero warnings
cargo fmt --all -- --check             # Check formatting
cargo test -p openfang-runtime         # Test single crate
cargo build --release -p openfang-cli  # Release CLI
```

## ADDING NEW FEATURES

### New API Route
1. Handler in `crates/openfang-api/src/routes.rs`
2. Register in `crates/openfang-api/src/server.rs`
3. Types in `crates/openfang-api/src/types.rs`

### New Config Field
1. Add to `KernelConfig` in `crates/openfang-types/src/config.rs`
2. Add `#[serde(default)]`
3. Add to the `Default` impl
4. Ensure `Serialize + Deserialize`

### New LLM Driver
1. Create `crates/openfang-runtime/src/drivers/<name>.rs`
2. Implement the `LlmDriver` trait
3. Register in `crates/openfang-runtime/src/drivers/mod.rs`
4. Add provider to model catalog in `crates/openfang-runtime/src/model_catalog.rs`

### New Built-in Tool
1. Handler in `crates/openfang-runtime/src/tool_runner.rs`
2. Declaration in `crates/openfang-types/src/tool.rs`

