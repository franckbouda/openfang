## STRUCTURE DES FICHIERS OPENFANG

```
~/.openfang/                          # Répertoire racine (home_dir)
├── config.toml                       # Configuration principale — FICHIER CLE
├── data/                             # Base de données (data_dir)
│   ├── memory.db                     # SQLite — mémoires agents
│   ├── knowledge.db                  # Graphe de connaissance
│   └── sessions/                     # Sessions de conversation
├── agents/                           # Agents utilisateur custom
│   └── <name>/agent.toml
├── workspaces/                       # Workspaces agents
│   └── <agent-id>/
├── tui.log                           # Logs TUI
└── custom_models.json                # Modèles custom

# Répertoire projet (agents built-in)
agents/<name>/agent.toml

# Source de vérité de tous les champs de config
crates/openfang-types/src/config.rs
```

