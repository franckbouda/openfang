## SUPPORTED LLM PROVIDERS

OpenFang supports 28 providers out of the box. Configure with environment variables:

| Provider | Env Var | Notes |
|----------|---------|-------|
| Groq | `GROQ_API_KEY` | Recommended for speed — llama-3.3-70b, llama-3.1-8b |
| Anthropic | `ANTHROPIC_API_KEY` | Claude models |
| OpenAI | `OPENAI_API_KEY` | GPT-4o, o3, o4-mini |
| Google Gemini | `GEMINI_API_KEY` or `GOOGLE_API_KEY` | Gemini 2.5 Flash/Pro |
| DeepSeek | `DEEPSEEK_API_KEY` | Very low cost |
| Mistral | `MISTRAL_API_KEY` | European option |
| OpenRouter | `OPENROUTER_API_KEY` | 100+ models via one key |
| Ollama | (no key needed) | Local models |
| LM Studio | (no key needed) | Local models |
| xAI | `XAI_API_KEY` | Grok models |

