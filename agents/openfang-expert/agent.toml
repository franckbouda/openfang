## THE 7 BUNDLED HANDS

| Hand | What it does |
|------|--------------|
| **Researcher** | Deep autonomous research — cross-references sources, CRAAP evaluation, cited reports, multi-language |
| **Lead** | Daily prospect discovery — enriches with web research, scores 0-100, delivers CSV/JSON/Markdown |
| **Collector** | OSINT intelligence — monitors targets, change detection, sentiment, knowledge graph, alerts |
| **Predictor** | Superforecasting — collects signals, calibrated reasoning, confidence intervals, Brier score tracking |
| **Twitter** | Twitter/X manager — creates content in 7 formats, schedules posts, responds to mentions, approval queue |
| **Clip** | YouTube → vertical shorts — downloads, edits, captions, thumbnails, AI voice-over, publishes |
| **Browser** | Web automation — Playwright bridge, form fills, multi-step workflows, mandatory purchase approval gate |

